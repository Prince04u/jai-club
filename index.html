<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jay Club - Color Prediction</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#040615;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:#020617;
}
.logo{
  color:#00ff88;
  font-size:22px;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}
.glow{
  color:#00ff88;
  text-shadow:0 0 15px #00ff88;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  background:linear-gradient(45deg,#00ff88,#00c3ff);
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}

/* GAME BOX */
.game{
  margin:30px auto;
  width:320px;
  background:#020617;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px #00ff88;
}

/* TIMER */
.timer{
  font-size:40px;
  color:#00ff88;
  margin:10px 0;
}

/* COLORS */
.colors{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}
.color-btn{
  padding:15px;
  border-radius:50%;
  cursor:pointer;
  width:60px;
  height:60px;
}
.red{background:red;}
.green{background:green;}
.violet{background:purple;}

/* RESULT */
.result{
  margin-top:15px;
  font-size:18px;
}

/* USERS */
.users{
  margin-top:20px;
  font-size:14px;
  opacity:0.8;
}

/* ANIMATION */
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
.blink{
  animation:blink 1s infinite;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">JAY CLUB</div>
  <div>Login</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Live <span class="glow">Color Prediction</span></h1>
  <p>Play & Earn Daily</p>
</div>

<!-- GAME -->
<div class="game">
  <h3>Next Round</h3>
  <div class="timer" id="timer">30</div>

  <div class="colors">
    <div class="color-btn red"></div>
    <div class="color-btn green"></div>
    <div class="color-btn violet"></div>
  </div>

  <div class="result" id="result">Waiting...</div>

  <div class="users" id="users">120 users playing...</div>
</div>

<script>
// TIMER
let time = 30;

setInterval(()=>{
  time--;
  if(time <= 0){
    time = 30;
    generateResult();
  }
  document.getElementById("timer").innerText = time;
},1000);

// RESULT RANDOM
function generateResult(){
  let colors = ["RED","GREEN","VIOLET"];
  let result = colors[Math.floor(Math.random()*colors.length)];

  let resBox = document.getElementById("result");
  resBox.innerText = "Result: " + result;
  resBox.classList.add("blink");

  setTimeout(()=>resBox.classList.remove("blink"),2000);
}

// FAKE USERS
setInterval(()=>{
  let num = Math.floor(Math.random()*200)+50;
  document.getElementById("users").innerText = num+" users playing...";
},3000);

</script>

</body>
</html>
